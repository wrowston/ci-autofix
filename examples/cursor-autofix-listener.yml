name: Cursor Autofix Listener

on:
  workflow_run:
    # Replace "CI" with the workflow names this listener should watch.
    workflows: ["CI"]
    types: [completed]

jobs:
  cursor-autofix:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.name != github.workflow &&
        !startsWith(github.event.workflow_run.head_branch, 'cursor/') &&
        (
          github.event.workflow_run.event != 'pull_request' ||
          github.event.workflow_run.head_repository.full_name == github.repository
        )
      }}
    permissions:
      contents: read
      pull-requests: read
    uses: wrowston/ci-autofix/.github/workflows/cursor-autofix.yml@main
    with:
      workflow_url: ${{ github.event.workflow_run.html_url }}
      workflow_name: ${{ github.event.workflow_run.name }}
      ref: ${{ github.event.workflow_run.head_sha }}
      branch: ${{ github.event.workflow_run.head_branch }}
      pr_url: ${{ github.event.workflow_run.pull_requests[0].html_url || '' }}
    secrets:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
