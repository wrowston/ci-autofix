name: Cursor Autofix

on:
  workflow_call:
    inputs:
      workflow_url:
        description: "Failed GitHub Actions run URL"
        required: false
        type: string
      workflow_name:
        description: "Name of the workflow that failed"
        required: false
        type: string
      pr_url:
        description: "Pull request URL to update, if applicable"
        required: false
        type: string
      ref:
        description: "Commit SHA or branch to inspect"
        required: false
        type: string
      branch:
        description: "Branch that contains the failed workflow run"
        required: false
        type: string
      model:
        description: "Cursor model ID to use for autofix runs"
        required: false
        type: string
        default: composer-2
      workflows:
        description: "Comma-separated workflow names to autofix"
        required: false
        type: string
      dry_run:
        description: "Print the generated prompt without calling the Cursor API"
        required: false
        type: boolean
        default: false
      autofix_ref:
        description: "Ref of wrowston/ci-autofix to use for the autofix implementation"
        required: false
        type: string
        default: main
    secrets:
      CURSOR_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      workflow_url:
        description: "Failed GitHub Actions run URL"
        required: false
        type: string
      workflow_name:
        description: "Name of the workflow that failed"
        required: false
        type: string
      pr_url:
        description: "Pull request URL to update, if applicable"
        required: false
        type: string
      ref:
        description: "Commit SHA or branch to inspect"
        required: false
        type: string
      branch:
        description: "Branch that contains the failed workflow run"
        required: false
        type: string
      model:
        description: "Cursor model ID to use for autofix runs"
        required: false
        type: string
        default: composer-2
      workflows:
        description: "Comma-separated workflow names to autofix"
        required: false
        type: string
      dry_run:
        description: "Print the generated prompt without calling the Cursor API"
        required: false
        type: boolean
        default: false
      autofix_ref:
        description: "Ref of wrowston/ci-autofix to use for the autofix implementation"
        required: false
        type: string
        default: main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: true

jobs:
  cursor-autofix:
    name: Cursor autofix
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name != 'workflow_run' ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'failure' &&
          github.event.workflow_run.name != github.workflow &&
          !startsWith(github.event.workflow_run.head_branch, 'cursor/') &&
          (
            github.event.workflow_run.event != 'pull_request' ||
            github.event.workflow_run.head_repository.full_name == github.repository
          )
        )
      }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout autofix implementation
        uses: actions/checkout@v4
        with:
          repository: wrowston/ci-autofix
          ref: ${{ inputs.autofix_ref || 'main' }}
          path: .cursor-autofix

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('.cursor-autofix/bun.lock', '.cursor-autofix/bun.lockb', '.cursor-autofix/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install
        working-directory: .cursor-autofix

      - name: Start Cursor Cloud Agent
        run: bun .github/scripts/cursor-autofix.ts
        working-directory: .cursor-autofix
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ inputs.model || vars.CURSOR_MODEL || 'composer-2' }}
          CURSOR_AUTOFIX_WORKFLOWS: ${{ inputs.workflows || vars.CURSOR_AUTOFIX_WORKFLOWS || '' }}
          CURSOR_AUTOFIX_DRY_RUN: ${{ inputs.dry_run || vars.CURSOR_AUTOFIX_DRY_RUN || 'false' }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url || inputs.workflow_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || inputs.workflow_name || github.workflow }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || 'failure' }}
          FAILED_REF: ${{ github.event.workflow_run.head_sha || inputs.ref || github.sha }}
          FAILED_BRANCH: ${{ github.event.workflow_run.head_branch || inputs.branch || github.ref_name }}
          PR_URL: ${{ github.event.workflow_run.pull_requests[0].html_url || inputs.pr_url || github.event.pull_request.html_url || '' }}
